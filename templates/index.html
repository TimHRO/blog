{% extends "base.html" %}

{% block content %}
<section class="py-12">
    <h1 class="text-5xl font-extrabold mb-4 text-white">Hello, I like ice cream.</h1>
    <p class="text-lg text-slate-400 mb-8">Welcome to my blog - I'm not that girl.</p>
    
    <h2 class="text-2xl font-bold mb-6 border-b border-slate-700 pb-2">Latest Posts</h2>
    <ul class="space-y-4">
        {% for page in section.pages %}
        <li class="bg-slate-800 p-4 rounded-lg hover:bg-slate-700 transition">
            <a href="{{ page.permalink }}" class="block">
                <span class="text-blue-300 font-semibold">{{ page.title }}</span>
                <span class="block text-sm text-slate-500">{{ page.date }}</span>
            </a>
        </li>
        {% endfor %}
    </ul>
</section>
{% endblock content %}
