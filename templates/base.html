<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 font-sans leading-normal">
    <nav class="p-6 border-b border-slate-800">
        <div class="max-w-4xl mx-auto flex justify-between">
            <a href="/" class="text-xl font-bold text-blue-400">Home</a>
            <div class="space-x-4">
                <a href="/posts" class="hover:text-white">Blog</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        {% block content %}
        {% endblock content %}
    </main>
</body>
</html>
