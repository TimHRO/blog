name: Deploy Zola Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zola
        run: |
          # Define the specific version
          ZOLA_VERSION=0.19.2
          # Download using -L (follow redirects) and -f (fail on server errors)
          curl -L -f -o zola.tar.gz "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          # Extract the binary
          tar -xvf zola.tar.gz
          # Move it to the system path
          sudo mv zola /usr/local/bin/

      - name: Build Site
        run: |
          # Explicitly target your zola.toml file
          zola --config zola.toml build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
